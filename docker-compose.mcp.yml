# Краткий пример: один порт 8888 — UI + MCP на /mcp (как в deploy/docker-compose.prod.yml).

services:
  stack-mcp:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    image: stack-mcp-ui:0.3.2
    restart: unless-stopped
    environment:
      STACK_MCP_CONFIG: /etc/stack-mcp/config.yaml
      STACK_MCP_EMBED_MCP: "true"
      STACK_MCP_STATELESS_HTTP: ${STACK_MCP_STATELESS_HTTP:-}
      STACK_MCP_SSH_HOSTS_FILE: ${STACK_MCP_SSH_HOSTS_FILE:-}
    ports:
      - "127.0.0.1:8888:8888"
    volumes:
      - ${STACK_MCP_CONFIG_HOST_PATH:?set STACK_MCP_CONFIG_HOST_PATH}:/etc/stack-mcp/config.yaml:ro
