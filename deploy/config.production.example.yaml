# Прод-пример: подставьте реальные DSN/пароли (в YAML подстановки ${VAR} не выполняются —
# храните файл как секрет или собирайте из шаблона в CI/CD).
# Несколько воркеров UI или реплик без sticky: задайте в окружении процесса STACK_MCP_STATELESS_HTTP=true (не в этом YAML).

modules:
  postgres:
    enabled: true
    dsn: postgresql://stack_mcp:REPLACE_PASSWORD@db.internal:5432/observability
    allowed_databases: [observability]
    schema_allowlist: [public]
    statement_timeout_seconds: 25
    long_query_limit: 15
    top_n_tables: 20
    allowlisted_queries: []

  redis:
    enabled: true
    url: redis://:REPLACE_PASSWORD@redis.internal:6379/0
    socket_timeout_seconds: 10
    scan_enabled: false

  kafka:
    enabled: true
    bootstrap_servers: [kafka.internal:9092]
    security_protocol: SASL_SSL
    sasl_mechanism: SCRAM-SHA-512
    sasl_username: stack-mcp
    sasl_password: REPLACE_KAFKA_PASSWORD
    topic_allowlist: [prod.events]
    allow_produce: false
    allow_admin: false

  opensearch:
    enabled: true
    hosts: [https://opensearch.internal:9200]
    use_ssl: true
    verify_certs: true
    username: stack_mcp
    password: null
    password_env: OPENSEARCH_PASSWORD
    allow_write: false
    rag:
      enabled: false
      index_allowlist: [agent-memory-prod]
      max_docs_per_index: 200000
      retrieval_size_cap: 12
      allow_delete_by_id: false
      auto_create_index: false

  prometheus:
    enabled: true
    base_url: https://prometheus.internal
    verify_tls: true
    bearer_token_path: /run/secrets/prometheus_token
    kafka_metrics_topic: null

  mail:
    enabled: false
    imap_host: mail.internal
    imap_port: 993
    imap_ssl: true
    imap_username: ""
    imap_username_env: MAIL_IMAP_USER
    imap_password_env: MAIL_IMAP_PASSWORD
    default_mailbox: INBOX
    smtp_host: smtp.internal
    smtp_port: 587
    smtp_ssl: false
    smtp_starttls: true
    smtp_username_env: MAIL_SMTP_USER
    smtp_password_env: MAIL_SMTP_PASSWORD

  ssh:
    enabled: false
    strict_host_key_checking: true
    builtin_safety_filter: true
    allow_shell_operators: false
    forbidden_substrings:
      - "rm -rf /"
    forbidden_regex: []
    hosts: []
