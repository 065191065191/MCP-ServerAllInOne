# Пример override: большой список SSH-хостов из отдельного файла на хосте.
# Запуск:
#   docker compose -f deploy/docker-compose.prod.yml -f deploy/docker-compose.prod.ssh-extra.yml --env-file deploy/.env up -d
#
# В deploy/.env задайте:
#   SDOCS_MCP_SSH_HOSTS_HOST_PATH=/etc/sdocs-mcp/ssh_hosts_generated.yaml
#   SDOCS_MCP_SSH_HOSTS_FILE=/etc/sdocs-mcp/ssh_hosts_extra.yaml

services:
  sdocs-mcp-mcp:
    environment:
      SDOCS_MCP_SSH_HOSTS_FILE: /etc/sdocs-mcp/ssh_hosts_extra.yaml
    volumes:
      - type: bind
        source: ${SDOCS_MCP_SSH_HOSTS_HOST_PATH:?path to generated ssh hosts yaml on host}
        target: /etc/sdocs-mcp/ssh_hosts_extra.yaml
        read_only: true
