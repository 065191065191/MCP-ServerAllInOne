# Пример Deployment только для процесса sdocs-mcp (без UI).
# Тот же образ, что UI, entrypoint переопределён на sdocs-mcp.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sdocs-mcp-config
  labels:
    app: sdocs-mcp
data:
  config.yaml: |
    modules: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sdocs-mcp
  labels:
    app: sdocs-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sdocs-mcp
  template:
    metadata:
      labels:
        app: sdocs-mcp
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: sdocs-mcp
          image: sdocs-mcp-ui:0.6.0
          imagePullPolicy: IfNotPresent
          command: ["sdocs-mcp"]
          ports:
            - name: mcp
              containerPort: 8765
              protocol: TCP
          env:
            - name: SDOCS_MCP_CONFIG
              value: /config/config.yaml
            - name: SDOCS_MCP_HOST
              value: "0.0.0.0"
            - name: SDOCS_MCP_PORT
              value: "8765"
            - name: SDOCS_MCP_TRANSPORT
              value: streamable-http
            # Service без sessionAffinity / несколько реплик: раскомментируйте
            # - name: SDOCS_MCP_STATELESS_HTTP
            #   value: "true"
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: mcp
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: mcp
            initialDelaySeconds: 20
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: sdocs-mcp-config
---
apiVersion: v1
kind: Service
metadata:
  name: sdocs-mcp
  labels:
    app: sdocs-mcp
spec:
  selector:
    app: sdocs-mcp
  ports:
    - name: mcp
      port: 8765
      targetPort: mcp
