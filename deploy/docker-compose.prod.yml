# Прод: один порт — UI/метрики + MCP Streamable HTTP на http://<host>:8888/mcp (STACK_MCP_EMBED_MCP=true).
# Использование:
#   cp deploy/env.production.example deploy/.env
#   # отредактировать .env и положить config.production.yaml рядом или указать путь в env
#   docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env up -d

services:
  stack-mcp-ui:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: stack-mcp-ui:${STACK_MCP_IMAGE_TAG:-0.2.6}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      STACK_MCP_CONFIG: /etc/stack-mcp/config.yaml
      STACK_MCP_EMBED_MCP: "true"
    ports:
      - "${STACK_MCP_UI_BIND:-127.0.0.1}:${STACK_MCP_UI_PORT:-8888}:8888"
    volumes:
      - type: bind
        source: ${STACK_MCP_CONFIG_HOST_PATH:?set STACK_MCP_CONFIG_HOST_PATH to host path of yaml}
        target: /etc/stack-mcp/config.yaml
        read_only: true
      - stack-mcp-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8888/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  stack-mcp-logs:
