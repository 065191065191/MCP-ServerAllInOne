# Прод: UI/метрики (8888) + MCP по HTTP (8765, Streamable HTTP /mcp). Конфиг с хоста.
# Использование:
#   cp deploy/env.production.example deploy/.env
#   # отредактировать .env и положить config.production.yaml рядом или указать путь в env
#   docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env up -d

services:
  stack-mcp-ui:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: stack-mcp-ui:${STACK_MCP_IMAGE_TAG:-0.2.4}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${STACK_MCP_UI_BIND:-127.0.0.1}:${STACK_MCP_UI_PORT:-8888}:8888"
    volumes:
      - type: bind
        source: ${STACK_MCP_CONFIG_HOST_PATH:?set STACK_MCP_CONFIG_HOST_PATH to host path of yaml}
        target: /etc/stack-mcp/config.yaml
        read_only: true
      - stack-mcp-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8888/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  stack-mcp-mcp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: stack-mcp-ui:${STACK_MCP_IMAGE_TAG:-0.2.4}
    restart: unless-stopped
    command: ["stack-mcp"]
    env_file:
      - .env
    environment:
      STACK_MCP_CONFIG: /etc/stack-mcp/config.yaml
      STACK_MCP_HOST: "0.0.0.0"
      STACK_MCP_PORT: "8765"
      STACK_MCP_TRANSPORT: streamable-http
    ports:
      - "${STACK_MCP_MCP_BIND:-127.0.0.1}:${STACK_MCP_MCP_PORT:-8765}:8765"
    volumes:
      - type: bind
        source: ${STACK_MCP_CONFIG_HOST_PATH:?set STACK_MCP_CONFIG_HOST_PATH to host path of yaml}
        target: /etc/stack-mcp/config.yaml
        read_only: true

volumes:
  stack-mcp-logs:
