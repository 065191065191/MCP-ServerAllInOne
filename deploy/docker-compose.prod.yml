# Прод: один порт — UI/метрики + MCP Streamable HTTP на http://<host>:8888/mcp (SDOCS_MCP_EMBED_MCP=true).
# Использование:
#   cp deploy/env.production.example deploy/.env
#   # отредактировать .env и положить config.production.yaml рядом или указать путь в env
#   docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env up -d

services:
  sdocs-mcp-ui:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: sdocs-mcp-ui:${SDOCS_MCP_IMAGE_TAG:-0.6.3}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SDOCS_MCP_CONFIG: /etc/sdocs-mcp/config.yaml
      SDOCS_MCP_EMBED_MCP: "true"
      SDOCS_MCP_STATELESS_HTTP: ${SDOCS_MCP_STATELESS_HTTP:-}
      # Логи UI и прочие данные только под /app/data (без записи в /var, /home, /opt)
      SDOCS_MCP_UI_AUDIT_LOG_PATH: /app/data/logs/ui-audit.log
    ports:
      - "${SDOCS_MCP_UI_BIND:-127.0.0.1}:${SDOCS_MCP_UI_PORT:-8888}:8888"
    volumes:
      - type: bind
        source: ${SDOCS_MCP_CONFIG_HOST_PATH:?set SDOCS_MCP_CONFIG_HOST_PATH to host path of yaml}
        target: /etc/sdocs-mcp/config.yaml
        read_only: true
      - sdocs-mcp-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8888/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  sdocs-mcp-data:
