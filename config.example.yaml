# Минимальный пример конфига SDocsMCP.
#
# Скопируйте в config.yaml и подставьте свои значения (REPLACE_ME),
# либо задайте путь через переменную окружения SDOCS_MCP_CONFIG=/абс/путь/config.yaml.
#
# В YAML НЕ выполняются подстановки ${VAR}. Если пароль не должен лежать в файле —
# используйте поля "*_env": приложение возьмёт значение из переменной окружения с этим именем.
#
# Полный справочник со всеми опциями (mTLS, RAG, аудит, SSH-политики, лимиты) —
# в deploy/config.production.example.yaml и docs/CAPABILITIES.md.
#
# Транспорт MCP по умолчанию: streamable-http, SDOCS_MCP_HOST=0.0.0.0, SDOCS_MCP_PORT=8765, путь /mcp.
# Для «всё на одном порту» (UI + MCP + /metrics) запускайте sdocs-mcp-ui с SDOCS_MCP_EMBED_MCP=true.

modules:

  # ───── OpenSearch ───────────────────────────────────────────────
  # Зачем: поиск/чтение индексов; опционально RAG-память агента и журнал вызовов tools.
  opensearch:
    enabled: true            # включить модуль; false — модуль не подключается
    hosts:
      - https://opensearch.internal:9200
    use_ssl: true            # https в URL обычно требует use_ssl: true
    verify_certs: true       # выключайте только для отладки c самоподписанным CA
    username: sdocs_mcp
    password: REPLACE_ME     # альтернатива: password_env: OPENSEARCH_PASSWORD (взять из ENV)

  # ───── Kafka (мониторинг) ───────────────────────────────────────
  # ms-eda, Cron→Prometheus и т.д. НЕ обязана совпадать с Kafka для Alert ниже.
  kafka:
    enabled: false
    bootstrap_servers:
      - kafka-monitored.internal:9092
    security_protocol: SASL_PLAINTEXT
    sasl_mechanism: SCRAM-SHA-512
    sasl_username: sdocs_mcp
    sasl_password: REPLACE_ME
    topic_allowlist:
      - ms-eda
      - sdocs.prometheus.metrics
    allow_produce: true

  # ───── Alerting (свой Kafka для синхронизации правил между подами) ─
  alerting:
    enabled: true
    kafka:
      enabled: true
      bootstrap_servers:
        - kafka-alerts.internal:9092
      security_protocol: SASL_SSL
      sasl_mechanism: SCRAM-SHA-512
      sasl_username: sdocs_mcp
      sasl_password: REPLACE_ME
      topic_allowlist:
        - sdocs.alerts.rules
        - sdocs.alerts.events
        - sdocs.alerts.lock
      allow_produce: true

  # ───── PostgreSQL ───────────────────────────────────────────────
  # Зачем: диагностика и разрешённые SELECT-ы по allowlisted_queries.
  postgres:
    enabled: false
    dsn: postgresql://sdocs_mcp:REPLACE_ME@db.internal:5432/observability

  # ───── Redis ────────────────────────────────────────────────────
  # Зачем: чтение с лимитами и опциональный SETEX.
  redis:
    enabled: false
    url: redis://:REPLACE_ME@redis.internal:6379/0   # rediss:// — для TLS-подключения

  # ───── Prometheus ───────────────────────────────────────────────
  # Зачем: instant/range/series-запросы через HTTP API Prometheus.
  prometheus:
    enabled: false
    base_url: http://prometheus.internal:9090
    basic_auth_username: null            # null — без авторизации
    basic_auth_password: null
    kafka_metrics_topic: sdocs.prometheus.metrics   # топик по умолчанию для prometheus_export_instant_to_kafka
    metrics_cron:
      enabled: true                      # UI «Cron»: опрос Prometheus → Kafka
      interval_seconds: 60               # 30, 60, … (мин. 15)
      query: up                          # PromQL для фоновой выгрузки

  # ───── Mail (IMAP + SMTP) ───────────────────────────────────────
  # Зачем: чтение ящика и отправка писем. Логин/пароль — в YAML или через *_env.
  mail:
    enabled: false
    # IMAP
    imap_host: mail.internal
    imap_port: 993                       # 993 — IMAPS
    imap_ssl: true
    imap_username: ""                     # пусто — взять из env (поле ниже)
    imap_username_env: SDOCS_MCP_MAIL_IMAP_USER
    imap_password: ""                     # либо imap_password_env при enabled: true
    imap_password_env: SDOCS_MCP_MAIL_IMAP_PASSWORD
    default_mailbox: INBOX
    # SMTP
    smtp_host: mail.internal
    smtp_port: 587                       # 587 — submission + STARTTLS; 465 — implicit TLS
    smtp_ssl: false
    smtp_starttls: true
    smtp_username_env: SDOCS_MCP_MAIL_SMTP_USER
    smtp_password: ""
    smtp_password_env: SDOCS_MCP_MAIL_SMTP_PASSWORD

# Access log MCP/UI (формат nginx combined) — консоль + файл
logging:
  enabled: false
  directory: logs
  filename: mcp-access.log
